{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Audit Logs</h2>
<table class="table table-bordered table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Action</th>
            <th>Reference</th>
            <th>Details</th>
            <th>Created At</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr>
            <td>{{ log.id }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.reference }}</td>
            <td>{{ log.details }}</td>
            <td>{{ log.created_at }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
